# ModSecurity custom tuning — loaded after the OWASP CRS rules

# Set to On (blocking) or DetectionOnly (log-only, safer to start)
SecRuleEngine On

# Increase body inspection limits for PHP file uploads
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072

# Log denied requests to the nginx error log
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
